name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  shell-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Run shell tests
        shell: bash
        run: |
          set -euo pipefail
          for test_script in tests/test-*.sh; do
            bash "$test_script"
          done
